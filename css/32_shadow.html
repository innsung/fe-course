<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow Style</title>
    <style>
        .text {
            text-shadow: 10px 5px 0 rgb(97, 99, 89, 0.5);
        }
        .box {
            width: 500px;
            height: 300px;
            background-color: aquamarine;
            box-shadow: 66px 18px 15px -13px rgba(0,0,0,0.75);
            /* -webkit-box-shadow: 66px 18px 15px -13px rgba(0,0,0,0.75); */
            /* -moz-box-shadow: 66px 18px 15px -13px rgba(0,0,0,0.75); */
        }
    </style>
</head>
<body>
    <h1>Shadow Style</h1>
    <h2 class="text">Text-shadow</h2>
    <h2 class="box">Box-shadow</h2>
</body>
</html>
