<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks Menus</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        * { 
            font-family: 'Nanum Gothic';
            background-color: 224.246,276; 
        }
        header {
            /* border: 1px solid red; */
            width: 1000px;
            margin: auto;
            display: flex; /*위 아래로 나오는게 아닌 옆으로 나오게 하는 기능*/
            justify-content: space-between;
        }
        .header-menu-top ul,
        .header-menu-bottom ul {
            display: flex;
            list-style: none;
            /* border: 1px solid blue; */
            justify-content: right;
            gap: 20px;
        }
        .header-menu-top ul a,
        .header-menu-bottom ul a {
            text-decoration: none;
            color: #333;
        }
        .header-menu-top ul {
            gap: 20px;
            font-size: 0.9rem;
        }
        .header-menu-bottom ul {
            gap: 20px;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }
        .header-menu-top li:last-child {
            border: 1px solid gray;
            border-radius: 4px;
            padding: 5px;
            background-color: white;
        }
        .header-menu-top li:last-child i{
            font-size: 1.5rem;
            background-color: white;
            font-weight: 700;
        }
        .header-menu-top li:last-child input{
            display: none;
        }
        main {
            width: 2000px;
            margin: auto;
            /* display: flex; */
            /* justify-content: space-between; */
        }
        .background-image {
            width: 1900px;
            height: 650px;
            /* border: 1px solid red; */
            display: flex;
            background-image: url("https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_bg_260220.jpg");
            align-items: center;
            justify-content: center;
            background-repeat: no-repeat;
        }
        .img1 {
            /* border: 1px solid red; */
            margin-right: 1200px;
        }
        .btn {
            position: absolute;
            left: 15%;
            top: 60%;
        }
        .button {
            width: 150px;
            height: 50px;
            color: blueviolet;
            text-decoration: none;
            text-align: center;
            border: 1px solid purple;
            background: none;
        }
        .s1 {
            position: absolute;
            left: 40%;
        }
        .s2 {
            position: absolute;
            top: 32%;
            left: 50%;
        }
        .s3 {
            position: absolute;
            left: 57%;
        }
        .s4 {
            position: absolute;
            left: 70%;
        }
        .s5 {
            position: absolute;
            left: 80%;
        }
        .s1, .s2, .s3, .s4, .s5, .img1, .button {
            opacity: 0;
            animation: appr 2s ease forwards;
        }
        .img1 {
            animation-delay: 0.5s;
        }
        .s1 {
            animation-delay: 1s;
        }
        .s2 {
            animation-delay: 1.5s;
        }
        .s3 {
            animation-delay: 2s;
        }
        .s4 {
            animation-delay: 2.5s;
        }
        .s5 {
            animation-delay: 3s;
        }
        .button {
            animation-delay: 3.5s;
        }
        @keyframes appr {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-logo">
            <img src="https://www.starbucks.co.kr/common/img/common/logo.png" alt="Logo">
        </div>
        <div class="header-menu">
            <nav class="header-menu-top">
                <ul>
                    <li><a href="#">Sign In</a></li>
                    <li><a href="#">My Starbucks</a></li>
                    <li><a href="#">Customer Service & Ideas</a></li>
                    <li><a href="#">Find a Store</a></li>
                    <li class="last-child">
                        <input type="text">
                        <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
                    </li>
                </ul>
            </nav>
            <nav class="header-menu-bottom">
                <ul>
                    <li><a href="#">COFFEE</a></li>
                    <li><a href="#">MENU</a></li>
                    <li><a href="#">STORE</a></li>
                    <li><a href="#">ESG</a></li>
                    <li><a href="#">STARBUCKS REWARDS</a></li>
                    <li><a href="#">COPORATE SALES</a></li>
                    <li><a href="#">WAHT'S NEW</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div class="background-image">
            <div class="cls1">
            <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_slogan_260220.png" alt="background-image" class="img1">
            </div>
            <div class="btn">
                <button class="button">자세히 보기</button>
            </div>
            <!-- <div class="season"> -->
                <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink01_260220.png" alt="s1" class="s1">
                <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink02_260220.png" alt="s2" class="s2">
                <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink03_260220.png" alt="s3" class="s3">
                <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink04_260220.png" alt="s4" class="s4">
                <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink05_260220.png" alt="s5" class="s5">
            <!-- </div> -->
        </div>


    </main>
</body>
</html>
