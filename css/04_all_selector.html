<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Selector</title>
    <meta name="description" content="Universal Selector">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <style>
        :root{
            /* 공통 프로퍼티를 변수로 정의 */
            --color-main: aquamarine;
            --color-font: red;
        }
        * {
            /* 전체 영역에 공통적인 속성을 정의하는 경우 */
            background-color: var(--color-main);
            /* font-family: 'Courier New', '맑은 고딕'; */
            margin: 0;
        }
        h1{
            color: var(--color-font);
            background-color: yellow;
            
        }
        h1, div{
            background-color: tomato;
        }
        p {
            font-family: "Open Sans", sans-serif;
            background-color: greenyellow;
            color: var(--color-font);
        }
        h3 {
            background-color: aqua;
        }
    </style>
</head>
<body>
    <h1>Universal(All) Selector</h1>
    <div>
        <h3>Sub Title</h3>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Suscipit architecto incidunt consectetur? Eaque nisi eos provident odit et ratione alias totam debitis! Corrupti distinctio reprehenderit consequuntur consequatur, ut doloremque quo.</p>
    </div>
</body>
</html>
