<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin-auto</title>
    <style>
        h1 {
            width: 50%;
            height: 200px;
            background-color: aquamarine;
            margin: auto;
        }
        div { 
            width: 50%;
            height: 500px;
            background-color: tomato;
        }
        p {
            width: 800px;
            background-color: white;
            margin: auto;
        }
    </style>
</head>
<body>
    <h1>margin - auto</h1>
    <div>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. 
            Saepe, unde soluta. Perferendis similique accusamus omnis, 
            quas sunt neque ipsam vero reprehenderit amet repellat iusto
            laborum, consectetur fugit esse. Cumque, nemo.</p>
    </div>
</body>
</html>
