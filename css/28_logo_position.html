<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Position</title>
    <style>
        .parent {
            font-family: 'Nanum Gothic';
            background-color: rgb(246, 245, 239); 
            /* border: 3px solid blue; */
            padding: 20px;
            width: 700px;
            position: relative;
        }
        .child {
            /* border: 1px solid red; 
            width: 200px; */
            position: absolute;
            top: 20px;
            left: 120px;
        }
    </style>
</head>
<body>
    <h1>Logo Position</h1>
    <div class="parent">
        <img src="https://www.starbucks.co.kr/common/img/common/logo.png" alt="">
        <p class="child">STARBUCKS COFFEE</p>
    </div>
</body>
</html>
