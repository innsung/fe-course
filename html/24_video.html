<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비디오, 오디오</title> <!--  1 웹사이트 검색했을 때 상단에 뜨기를 원하는 제목을 title에 지정
                                    예를 들어 "HTML5"를 구글에 검색했을 때 상단에 뜨기를 원하면 title에 "HTML5" 내용 포함하기-->
</head>
<body>
    <h1>비디오, 오디오</h1><!-- 2 웹사이트 검색했을 때 상단에 뜨기를 원하는 제목을 h1에 지정
                                예를 들어 "HTML5"를 구글에 검색했을 때 상단에 뜨기를 원하면 h1에 "HTML5" 내용 포함하기-->
    <video src="../images/tiny.mp4"
        autoplay
        controls></video>
    <hr>
    <h1>왕과 사는 남자 [예고편]</h1>
    <iframe width="700" height="500" 
        src="https://www.youtube.com/embed/9sxEZuJskvM?si=81nzyU2b2XPIugR4" 
        title="YouTube video player" frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        referrerpolicy="strict-origin-when-cross-origin" 
        allowfullscreen></iframe>
</body>
</html>
